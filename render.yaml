services:
  - type: web
    name: cineverse
    runtime: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && cd cineverse && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "cd cineverse && gunicorn cineverse.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.0"
